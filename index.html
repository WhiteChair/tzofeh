<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tzofeh — Geopolitical Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ── LIGHT THEME (default) ── */
:root{
  --bg:#FFF1E0;--surf:#FFFFFF;--surf2:#FBF3E9;--surf3:#F5E8D6;
  --bd:#E2D5C8;--bd2:#C8B9A8;
  --tx:#1A1614;--mu:#6B5E52;--fa:#A8998C;
  --acc:#0D7680;--acc2:#0A5F68;
  --or:#EB6400;--rd:#B02020;--bl:#0F5499;--pu:#990F3D;--pi:#C6426B;
  --green:#1A6600;
  --warn-bg:#FFF3E0;--warn-bd:#F5C980;
  --danger-bg:#FFF0F0;--danger-bd:#F0AAAA;
  --info-bg:#E8F4F8;--info-bd:#90CAD8;
  --nav-bg:rgba(255,241,224,0.97);--nav-border:#990F3D;
  --card-shadow:0 1px 3px rgba(0,0,0,.04);
  --theme-icon:"☽";
}
/* ── DARK THEME ── */
body.dark{
  --bg:#07090e;--surf:#0d1117;--surf2:#141b24;--surf3:#1c2333;
  --bd:#1c2333;--bd2:#2d3748;
  --tx:#cdd9e5;--mu:#768390;--fa:#3d4451;
  --acc:#00d98b;--acc2:#00b377;
  --or:#e3a447;--rd:#f47067;--bl:#4493f8;--pu:#d2a8ff;--pi:#e879a0;
  --green:#3fb950;
  --warn-bg:rgba(227,164,71,.08);--warn-bd:rgba(227,164,71,.25);
  --danger-bg:rgba(244,112,103,.08);--danger-bd:rgba(244,112,103,.25);
  --info-bg:rgba(68,147,248,.08);--info-bd:rgba(68,147,248,.25);
  --nav-bg:rgba(7,9,14,0.97);--nav-border:#d2a8ff;
  --card-shadow:none;
  --theme-icon:"☀";
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Source Sans 3',-apple-system,sans-serif;font-size:13.5px;min-height:100vh;transition:background .25s,color .25s;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(8px);border-bottom:2px solid var(--nav-border);padding:0 16px;display:flex;align-items:center;gap:0;overflow-x:auto;}
.nav-brand{display:flex;align-items:center;gap:8px;padding:12px 16px 12px 0;border-right:1px solid var(--bd2);margin-right:6px;white-space:nowrap;text-decoration:none;}
.brand-he{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--pu);letter-spacing:-.01em;}
.brand-en{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;color:var(--mu);letter-spacing:.12em;text-transform:uppercase;margin-top:1px;}
.live-dot{width:6px;height:6px;background:var(--acc);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.tab-btn{background:none;border:none;color:var(--mu);font-family:'Source Sans 3',sans-serif;font-size:12.5px;font-weight:500;padding:13px 11px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab-btn:hover{color:var(--tx);}
.tab-btn.active{color:var(--pu);border-bottom-color:var(--pu);font-weight:600;}
.tab-btn.matrix-tab.active{color:var(--bl);border-bottom-color:var(--bl);}
.theme-toggle{margin-left:auto;flex-shrink:0;background:var(--surf2);border:1px solid var(--bd2);color:var(--mu);font-size:15px;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.theme-toggle:hover{border-color:var(--acc);color:var(--acc);}

/* TICKER */
.ticker-bar{background:var(--pu);padding:5px 24px;overflow:hidden;}
.ticker-inner{display:flex;gap:0;white-space:nowrap;}
.tick-item{display:inline-flex;align-items:center;gap:6px;padding:0 18px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.9);border-right:1px solid rgba(255,255,255,.2);}
.tick-item:first-child{padding-left:0;}

/* PANELS */
.tab-panel{display:none;padding:22px 28px 80px;max-width:1440px;margin:0 auto;}
.tab-panel.active{display:block;}

/* GRID */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media(max-width:1100px){.two-col{grid-template-columns:1fr;}.three-col{grid-template-columns:1fr 1fr;}}

/* CARDS */
.card{background:var(--surf);border:1px solid var(--bd);border-radius:6px;padding:16px 18px;margin-bottom:16px;box-shadow:var(--card-shadow);transition:background .25s,border-color .25s;}
.card-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bd);}
.card-title{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;color:var(--mu);letter-spacing:.14em;text-transform:uppercase;}

/* BADGES */
.badge{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.04em;padding:2px 7px;border-radius:3px;}
.bg{background:#E0F5F0;color:var(--acc);}
.bo{background:var(--warn-bg);color:var(--or);border:1px solid var(--warn-bd);}
.br{background:var(--danger-bg);color:var(--rd);border:1px solid var(--danger-bd);}
.bb{background:var(--info-bg);color:var(--bl);border:1px solid var(--info-bd);}
.bp{background:#F9EAF0;color:var(--pi);}
.bpu{background:#F5EAF0;color:var(--pu);border:1px solid #DDB8CC;}
.updated{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--fa);}
.live-badge{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:1px 5px;border-radius:3px;background:#E0F5F0;color:var(--acc);border:1px solid #9FDDD5;}
.static-badge{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:1px 5px;border-radius:3px;background:var(--surf2);color:var(--fa);border:1px solid var(--bd);}

/* PANEL HEADER */
.panel-hdr{display:flex;align-items:center;gap:14px;margin-bottom:22px;padding-bottom:16px;border-bottom:2px solid var(--bd);}
.flag{font-size:28px;}
.ctry-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--tx);}
.ctry-meta{font-size:11px;color:var(--mu);margin-top:2px;}
.sec-title{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;color:var(--pu);letter-spacing:.14em;text-transform:uppercase;margin:20px 0 12px;display:flex;align-items:center;gap:8px;}
.sec-title::before{content:'';display:inline-block;width:3px;height:10px;background:var(--pu);border-radius:2px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--bd);}

/* TABLES */
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);text-align:left;padding:5px 8px;border-bottom:1px solid var(--bd);background:var(--surf2);}
.data-table td{padding:7px 8px;border-bottom:1px solid var(--bd);color:var(--tx);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:var(--surf2);}

/* MATRIX TABLE */
.matrix-table{width:100%;border-collapse:collapse;font-size:12px;}
.matrix-table th{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);text-align:left;padding:8px 10px;border-bottom:2px solid var(--bd2);background:var(--surf2);white-space:nowrap;}
.matrix-table td{padding:10px 10px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.matrix-table tr:hover td{background:var(--surf2);cursor:pointer;}
.matrix-table tr:last-child td{border-bottom:none;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.kpi-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:4px;}
.kpi-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:4px;}
.kpi-card{background:var(--surf2);border:1px solid var(--bd);border-radius:5px;padding:11px 13px;}
.kpi-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:4px;}
.kpi-val{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;line-height:1;color:var(--tx);}
.kpi-delta{font-family:'IBM Plex Mono',monospace;font-size:10px;margin-top:3px;}
.pos{color:var(--green);}
.neg{color:var(--rd);}
.neu{color:var(--mu);}

/* PARLIAMENT */
.parl-bar{display:flex;height:28px;border-radius:4px;overflow:hidden;gap:2px;margin:10px 0;}
.parl-seg{height:100%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;color:rgba(255,255,255,.9);min-width:16px;cursor:pointer;transition:filter .15s;}
.parl-seg:hover{filter:brightness(1.2);}
#party-tip{position:fixed;display:none;background:var(--surf);border:1px solid var(--bd2);border-radius:8px;padding:14px 16px;z-index:9999;font-size:11px;max-width:260px;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.14);}
.party-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);}
.party-row:last-child{border-bottom:none;}
.pdot{display:inline-block;width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.pstat{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu);}

/* ELECTIONS */
.el-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
.el-card{background:var(--surf2);border:1px solid var(--bd);border-radius:5px;padding:12px;}
.el-type{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.el-days{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;line-height:1;}

/* LEADER */
.leader-card{display:flex;align-items:center;gap:12px;background:var(--surf2);border:1px solid var(--bd);border-radius:5px;padding:11px 13px;margin-bottom:10px;}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--surf3);border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--pu);flex-shrink:0;}
.lname{font-size:13px;font-weight:600;}
.lrole{font-size:10px;color:var(--mu);margin-top:1px;}
.lparty{font-size:10px;color:var(--or);margin-top:2px;}

/* APPROVAL */
.approval-wrap{display:flex;align-items:flex-start;gap:16px;}
.appr-num{font-family:'IBM Plex Mono',monospace;font-size:36px;font-weight:600;line-height:1;}
.appr-src{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--fa);margin-top:5px;}

/* YIELDS */
.yield-pills{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.yield-pill{background:var(--surf2);border:1px solid var(--bd);border-radius:5px;padding:8px 12px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:76px;}
.ylbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mu);letter-spacing:.08em;}
.yval{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;color:var(--tx);}
.ychg{font-family:'IBM Plex Mono',monospace;font-size:9px;}
.shape-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;border:1px solid;}
.sh-n{color:var(--acc);border-color:rgba(13,118,128,.3);background:#E0F5F0;}
.sh-f{color:var(--or);border-color:rgba(235,100,0,.3);background:var(--warn-bg);}
.sh-i{color:var(--rd);border-color:rgba(176,32,32,.3);background:var(--danger-bg);}
.inv-alert{background:var(--danger-bg);border:1px solid var(--danger-bd);color:var(--rd);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 10px;border-radius:4px;display:inline-block;margin-bottom:10px;}

/* FX */
.fx-val{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:var(--tx);}
.fx-pair{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mu);letter-spacing:.08em;}
.ma-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.ma-pill{background:var(--surf2);border:1px solid var(--bd);border-radius:3px;padding:3px 8px;font-family:'IBM Plex Mono',monospace;font-size:9px;display:flex;gap:5px;align-items:center;}
.ma-lbl{color:var(--mu);}
.spread-pill{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 7px;border-radius:3px;display:inline-flex;align-items:center;gap:4px;}
.sp-wide{background:var(--danger-bg);color:var(--rd);}
.sp-mid{background:var(--warn-bg);color:var(--or);}
.sp-tight{background:#E0F5F0;color:var(--acc);}
.sp-neg{background:var(--info-bg);color:var(--bl);}

/* CB */
.cb-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd);}
.cb-row:last-child{border-bottom:none;}
.cb-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);width:110px;flex-shrink:0;}
.cb-val{font-size:12px;font-weight:500;}
.traj{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600;}
.tr-cut{background:#E0F5F0;color:var(--acc);}
.tr-hik{background:var(--danger-bg);color:var(--rd);}
.tr-eas{background:var(--info-bg);color:var(--bl);}
.tr-hold{background:var(--surf2);color:var(--mu);border:1px solid var(--bd);}

/* COALITION */
.coal-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:3px 8px;border-radius:3px;font-weight:600;}
.coal-maj{background:#E0F5F0;color:var(--acc);}
.coal-slim{background:var(--warn-bg);color:var(--or);}
.coal-min{background:var(--danger-bg);color:var(--rd);}

/* BUDGET */
.bud-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--bd);}
.bud-row:last-child{border-bottom:none;}
.bud-rk{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;color:var(--bd2);width:18px;flex-shrink:0;}
.bud-nm{flex:1;font-size:12px;}
.bud-pct{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--acc);width:38px;text-align:right;font-weight:600;}
.bud-amt{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu);width:90px;text-align:right;}

/* FISCAL GRADE */
.fiscal-card{border-radius:6px;padding:16px 18px;border-left:4px solid;margin-bottom:14px;background:var(--surf2);}
.grade-lbl{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;line-height:1;}

/* FYP */
.fyp-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd);align-items:flex-start;}
.fyp-row:last-child{border-bottom:none;}
.fyp-st{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;white-space:nowrap;margin-top:1px;}
.st-on{background:#E0F5F0;color:var(--acc);}
.st-dl{background:var(--danger-bg);color:var(--rd);}
.st-ex{background:var(--info-bg);color:var(--bl);}

/* DEMOGRAPHIC ANALYSIS */
.demo-analysis{background:var(--surf2);border:1px solid var(--bd);border-radius:5px;padding:12px 14px;margin-bottom:12px;}
.demo-status{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--bd);}
.demo-icon{font-size:22px;}
.demo-label{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;}
.demo-text{font-size:12px;color:var(--mu);line-height:1.6;}
.demo-stat-row{display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);}
.demo-stat{flex:1;text-align:center;}
.demo-stat-val{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;}
.demo-stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.1em;color:var(--mu);text-transform:uppercase;margin-top:2px;}

/* MACRO INDICATORS */
.macro-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd);}
.macro-row:last-child{border-bottom:none;}
.macro-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);flex:1;}
.macro-val{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;}
.macro-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mu);margin-left:4px;}

/* EU MEETINGS */
.mtg-row{display:grid;grid-template-columns:88px 130px 1fr;gap:12px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:12px;align-items:start;}
.mtg-row:last-child{border-bottom:none;}
.mtg-dt{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--acc);}
.mtg-body{color:var(--mu);font-size:11px;}

/* MATRIX */
.matrix-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--bd);}
.matrix-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--bl);}
.refresh-btn{background:var(--surf2);border:1px solid var(--bd2);color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 12px;border-radius:4px;cursor:pointer;transition:all .15s;}
.refresh-btn:hover{background:var(--surf3);border-color:var(--acc);color:var(--acc);}
.refresh-btn:disabled{opacity:.4;cursor:not-allowed;}

/* FOOTER */
.site-footer{background:var(--pu);color:rgba(255,255,255,.85);padding:20px 28px;text-align:center;margin-top:40px;}
.site-footer a{color:rgba(255,255,255,.9);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:11px;border-bottom:1px solid rgba(255,255,255,.3);padding-bottom:1px;transition:border-color .15s;}
.site-footer a:hover{border-bottom-color:white;}
.footer-brand{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:white;margin-bottom:6px;}

.mono{font-family:'IBM Plex Mono',monospace;}
.dim{color:var(--mu);}
.chart-wrap{position:relative;width:100%;}

/* RATINGS */
.rating-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.rating-pill{background:var(--surf2);border:1px solid var(--bd);border-radius:4px;padding:6px 10px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:72px;}
.rating-agency{font-family:'IBM Plex Mono',monospace;font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);}
.rating-val{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;line-height:1;}
.rating-outlook{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 6px;border-radius:2px;margin-top:1px;letter-spacing:.05em;}
.ro-stable{background:#E0F5F0;color:var(--acc);}
.ro-negative{background:var(--danger-bg);color:var(--rd);border:1px solid var(--danger-bd);}
.ro-positive{background:var(--info-bg);color:var(--bl);border:1px solid var(--info-bd);}
.ro-watch{background:var(--warn-bg);color:var(--or);border:1px solid var(--warn-bd);}
.rating-compact{font-family:'IBM Plex Mono',monospace;font-size:10px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.rc-pill{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;}

/* UNEMPLOYMENT */
.unemp-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.unemp-cell{background:var(--surf2);border:1px solid var(--bd);border-radius:4px;padding:8px 10px;}
.unemp-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:4px;}
.unemp-val{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700;line-height:1;}
.unemp-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mu);margin-top:2px;}
.unemp-bar{height:3px;border-radius:2px;margin-top:5px;transition:width .6s ease;}

/* GOVT EMPLOYMENT */
.govtemp-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--bd);}
.govtemp-row:last-child{border-bottom:none;}
.govtemp-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);flex:1;}
.govtemp-pct{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;}

function daysUntil(t){return Math.max(0,Math.ceil((t-new Date())/864e5));}
function elColor(d){return d<180?'var(--rd)':d<365?'var(--or)':'var(--green)';}
function sign(v){return v>0?'+':'';}
function posNeg(v,inverse=false){
  const pos=inverse?(v<0):(v>0);
  return pos?'pos':'neg';
}

function fiscalGrade(def,ds,dg){
  const s1=def>=-2?35:def>=-3?28:def>=-5?18:def>=-7?8:0;
  const s2=ds<5?35:ds<10?26:ds<15?16:ds<20?6:0;
  const s3=dg<40?30:dg<60?24:dg<80?16:dg<100?8:dg<150?3:0;
  const sc=s1+s2+s3;
  const g=sc>=75?'A':sc>=55?'B':sc>=35?'C':sc>=18?'D':'F';
  const col=g==='A'?'var(--green)':g==='B'?'var(--bl)':g==='C'?'var(--or)':'var(--rd)';
  return {score:sc,grade:g,color:col};
}

function coalitionStatus(parl){
  const maj=Math.floor(parl.totalSeats/2)+1;
  const gov=parl.parties.filter(p=>p.coalition).reduce((s,p)=>s+p.seats,0);
  const gap=gov-maj;
  let status,cls;
  if(gov>=maj){status=gap<30?'SLIM MAJ.':'MAJORITY';cls=gap<30?'coal-slim':'coal-maj';}
  else{status='MINORITY';cls='coal-min';}
  return{status,cls,gap,govSeats:gov,majority:maj,pct:(gov/parl.totalSeats*100).toFixed(1)};
}

function trajLabel(t){
  const m={cutting:'↓ CUTTING',hiking:'↑ HIKING',easing:'↓ EASING',holding:'→ HOLDING'};
  const c={cutting:'tr-cut',hiking:'tr-hik',easing:'tr-eas',holding:'tr-hold'};
  return`<span class="traj ${c[t]||'tr-hold'}">${m[t]||t.toUpperCase()}</span>`;
}

function spreadLabel(bps){
  if(bps===0)return`<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu)">DE BUND BASE</span>`;
  const cls=bps<0?'sp-neg':bps<80?'sp-tight':bps<150?'sp-mid':'sp-wide';
  return`<span class="spread-pill ${cls}">${sign(bps)}${bps}bps vs Bund</span>`;
}

  }[trend]||{icon:'—',label:'UNKNOWN',color:'var(--mu)',bg:'var(--surf2)',border:'var(--bd)'};

function sparkSVG(values,color){
  const w=200,h=60,p=8;
  const iw=w-p*2,ih=h-p*2-10;
  const mn=Math.min(...values),mx=Math.max(...values),rng=mx-mn||.5;
  const pts=values.map((v,i)=>{
    const x=p+(i/(values.length-1))*iw;
    const y=p+ih-((v-mn)/rng)*ih;
    return`${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const last=pts.split(' ').pop().split(',').map(Number);
  const trend=values[values.length-1]-values[0];
  const tc=trend>0?'var(--rd)':'var(--green)';
  return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="3" fill="${color}"/>
    <text x="${p}" y="${h-1}" font-family="IBM Plex Mono,monospace" font-size="9" fill="#A8998C">${values[0].toFixed(1)}%</text>
    <text x="${w-p}" y="${h-1}" font-family="IBM Plex Mono,monospace" font-size="9" fill="${tc}" text-anchor="end">${values[values.length-1].toFixed(1)}%</text>
  </svg>`;
}


/* ══════════════════════ RATINGS ══════════════════════ */
function outlookClass(o){
  const l=(o||'').toLowerCase();
  return l.includes('neg')?'ro-negative':l.includes('pos')?'ro-positive':l.includes('watch')?'ro-watch':'ro-stable';
}
function ratingColor(r){
  if(!r)return'var(--mu)';
  const s=r.replace(/[^A-Za-z+]/g,'');
  if(s==='AAA'||s==='Aaa')return'var(--green)';
  if(s.startsWith('AA')||s.startsWith('Aa'))return'var(--acc)';
  if(s.startsWith('A'))return'var(--bl)';
  return'var(--or)';
}
function ratingsBlock(ratings){
  if(!ratings)return'';
  const agencies=[["S&P",ratings.sp],["Moody's",ratings.moodys],["Fitch",ratings.fitch]];
  return`<div class="card-hdr" style="margin-top:14px"><span class="card-title">Sovereign Credit Ratings</span><span class="static-badge">Mar 2025</span></div>
  <div class="rating-row">
    ${agencies.map(([a,d])=>`<div class="rating-pill">
      <div class="rating-agency">${a}</div>
      <div class="rating-val" style="color:${ratingColor(d.r)}">${d.r}</div>
      <div class="rating-outlook ${outlookClass(d.o)}">${d.o.toUpperCase()}</div>
    </div>`).join('')}
  </div>`;
}
function ratingsCompact(ratings){
  if(!ratings)return'';
  const agencies=[["S&P",ratings.sp],["Moody's",ratings.moodys],["Fitch",ratings.fitch]];
  return`<div class="rating-compact">${agencies.map(([a,d])=>{
    const oc=outlookClass(d.o);
    const arrow=d.o.toLowerCase().includes('neg')?'↓':d.o.toLowerCase().includes('pos')?'↑':'↔';
    return`<span class="rc-pill ${oc}" title="${a}: ${d.r} / ${d.o}">${d.r}${arrow}</span>`;
  }).join('')}</div>`;
}

const ENERGY_COLORS={

  nuclear:'#9B59B6', hydro:'#3498db',
  wind:'#27ae60', solar:'#f1c40f', other:'#95a5a6'

function energyBlock(e,country){
  const countryId=country.toLowerCase().replace(/[^a-z]/g,'');

  const total=Object.values(mix).reduce((s,v)=>s+v,0);

  }).join('');

    </div>

    </div>

/* ══════════════════════ ENERGY DONUT ══════════════════════ */
function renderEnergyDonut(cid, mix){
  const canvasId = `energy-donut-${cid}`;
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  if(CHARTS[canvasId]) { CHARTS[canvasId].destroy(); delete CHARTS[canvasId]; }
  const labels = Object.keys(mix).filter(k => mix[k] > 0);
  const values = labels.map(k => mix[k]);
  const colors = labels.map(k => ENERGY_COLORS[k] || '#999');
  const isDark = document.body.classList.contains('dark');
  const ttBg = isDark ? '#0d1117' : '#fff';
  const ttTitle = isDark ? '#cdd9e5' : '#1A1614';
  const ttBody  = isDark ? '#768390' : '#6B5E52';
  const ttBd    = isDark ? '#1c2333' : '#E2D5C8';
  CHARTS[canvasId] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: colors,
        borderColor: isDark ? '#0d1117' : '#fff',
        borderWidth: 2,
        hoverOffset: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '55%',
      plugins: {
        legend: {
          display: true,
          position: 'right',
          labels: {
            color: isDark ? '#768390' : '#6B5E52',
            font: { family: "'IBM Plex Mono'", size: 9 },
            padding: 8,
            boxWidth: 10,
            usePointStyle: true,
          }
        },
        tooltip: {
          backgroundColor: ttBg,
          titleColor: ttTitle,
          bodyColor: ttBody,
          borderColor: ttBd,
          borderWidth: 1,
          callbacks: { label: c => ` ${c.label}: ${c.parsed}%` }
        }
      }
    }
  });
}

/* ══════════════════════ TICKER ══════════════════════ */
function buildTicker(){
  const alerts=[];
  const all=[...Object.values(C),CHINA];
  all.forEach(d=>{
    const ap=d.pm?.approval??d.leader?.approval;
    if(ap!=null&&ap<30) alerts.push(`${d.flag} ${d.name}: Leader approval ${ap}%`);
    if(d.yields?.inverted) alerts.push(`${d.flag} ${d.name}: Yield curve INVERTED ⚠`);
    if(d.fiscal?.deficit<-6.5) alerts.push(`${d.flag} Deficit at ${d.fiscal.deficit}% GDP`);
    if(d.macro?.cpiYoy<0) alerts.push(`${d.flag} ${d.name}: DEFLATION — CPI ${d.macro.cpiYoy}%`);
    if(d.id!=='china'&&d.parliament){
      const cs=coalitionStatus(d.parliament);
      if(cs.status==='MINORITY') alerts.push(`${d.flag} ${d.name}: Minority government — gap ${cs.gap} seats`);
    }
    if(d.elections){
      const leg=d.elections.legislative?.target;
      if(leg&&daysUntil(leg)<180) alerts.push(`${d.flag} ${d.name}: ${d.elections.legislative.label} in ${daysUntil(leg)} days`);
    }
    if(d.centralBank?.trajectory==='hiking') alerts.push(`${d.flag} BoJ hiking — JGB yield normalisation underway`);
  });
  const inner=document.getElementById('ticker-inner');
  if(!alerts.length){document.querySelector('.ticker-bar').style.display='none';return;}
  inner.innerHTML=alerts.map(a=>`<div class="tick-item">▸ ${a}</div>`).join('');
}

/* ══════════════════════ COUNTRY ══════════════════════ */
function renderCountry(cid){
  const d=C[cid];
  const cs=coalitionStatus(d.parliament);
  const fg=fiscalGrade(d.fiscal.deficit,d.fiscal.debtService,d.debtGdp);
  const apPerson=d.pm?.approval!=null?d.pm:d.leader;
  const dc=demoStatusConfig(d.population.trend);

  /* Cabinet */
  let cab=`<table class="data-table"><thead><tr><th>Role</th><th>Name</th><th>Party</th><th>Since</th></tr></thead><tbody>`;
  d.cabinet.forEach(c=>{cab+=`<tr><td class="dim">${c.role}</td><td style="font-weight:600">${c.name}</td><td class="dim" style="font-size:10px">${c.party}</td><td class="mono dim" style="font-size:10px">${c.since}</td></tr>`;});
  cab+=`</tbody></table>`;

  /* Parliament */
  const tot=d.parliament.totalSeats;
  let parlBar='',parlLeg='';
  d.parliament.parties.forEach(p=>{
    const pct=(p.seats/tot*100).toFixed(1);
    const govBorder=p.coalition?'border-top:3px solid var(--acc);':'';
    parlBar+=`<div class="parl-seg" style="width:${pct}%;background:${p.color};${govBorder}"
      data-party="${p.name}" data-seats="${p.seats}" data-pct="${pct}"
      data-leader="${p.leader}" data-role="${p.role}" data-bio="${p.bio}" data-coalition="${p.coalition}"
      onclick="showPartyTip(event,this)">${p.seats>30?p.seats:''}</div>`;
    const govB=p.coalition?`<span class="badge bg" style="margin-left:4px;font-size:8px">GOV</span>`:'';
    parlLeg+=`<div class="party-row"><span class="pdot" style="background:${p.color}"></span><span style="flex:1">${p.name}${govB}</span><span class="pstat">${p.seats} · ${pct}%</span></div>
    <div style="padding:2px 8px 5px;font-size:10px;color:var(--fa)">${p.leader} — ${p.role}</div>`;
  });

  /* Elections */
  let elH='';
  if(d.elections.presidential){
    const days=daysUntil(d.elections.presidential.target);
    elH+=`<div class="el-card"><div class="el-type">Presidential</div><div class="el-days" style="color:${elColor(days)}">${days.toLocaleString()}</div><div style="font-size:10px;color:var(--mu);margin-top:1px">days</div><div style="font-size:10px;color:var(--fa);margin-top:4px">${d.elections.presidential.date}</div></div>`;
  }
  if(d.elections.legislative){
    const days=daysUntil(d.elections.legislative.target);
    elH+=`<div class="el-card"><div class="el-type">${d.elections.legislative.label||'Legislative'}</div><div class="el-days" style="color:${elColor(days)}">${days.toLocaleString()}</div><div style="font-size:10px;color:var(--mu);margin-top:1px">days</div><div style="font-size:10px;color:var(--fa);margin-top:4px">${d.elections.legislative.date}</div></div>`;
  }
  if(d.elections.lowerHouse){
    const days=daysUntil(d.elections.lowerHouse.target);
    elH+=`<div class="el-card"><div class="el-type">${d.elections.lowerHouse.label}</div><div class="el-days" style="color:${elColor(days)}">${days.toLocaleString()}</div><div style="font-size:10px;color:var(--mu);margin-top:1px">days</div><div style="font-size:10px;color:var(--fa);margin-top:4px">${d.elections.lowerHouse.date}</div></div>`;
  }

  /* Approval — supports single person OR dual (President + PM) */
  function approvalBlock(person,trend,src,srcUrl){
    const ap=person.approval,dis=person.disapproval;
    if(ap==null)return`<div style="color:var(--mu);font-size:11px;padding:6px 0">No independent polling available for ${person.title}</div>`;
    const net=ap-dis;
    return`<div style="margin-bottom:12px">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:6px">${person.title}: ${person.name}</div>
      <div class="approval-wrap">
        <div style="min-width:88px">
          <div class="appr-num" style="color:${ap>=50?'var(--green)':ap>=35?'var(--or)':'var(--rd)'}">${ap}%</div>
          <div style="font-size:10px;color:var(--mu);margin-top:2px">Approve</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--rd);margin-top:6px">${dis}%</div>
          <div style="font-size:10px;color:var(--mu)">Disapprove</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:${net>=0?'var(--green)':'var(--rd)'};margin-top:6px">${sign(net)}${net}pp</div>
          <div style="font-size:10px;color:var(--mu)">Net</div>
        </div>
        <div style="flex:1">${trend?sparkSVG(trend,ap>=40?'#0D7680':ap>=30?'#EB6400':'#B02020'):''}

        </div>
      </div>
    </div>`;
  }

  let apH='';
  // France: show both President and PM
  if(cid==='france'&&d.leader.approval!=null){
    apH=approvalBlock(d.leader,d.approvalTrend,d.approvalSource,d.approvalSourceUrl);
    if(d.pm&&d.pm.approval!=null) apH+=`<div style="border-top:1px solid var(--bd);padding-top:10px;margin-top:2px">${approvalBlock(d.pm,null,null,null)}</div>`;
  } else {
    const person=d.pm&&d.pm.approval!=null?d.pm:d.leader;
    if(person.approval==null){apH=`<div style="color:var(--mu);font-size:11px;padding:8px 0">No independent polling available</div>`;}
    else{apH=approvalBlock(person,d.approvalTrend,d.approvalSource,d.approvalSourceUrl);}
  }

  /* Yields */
  const yr=d.yields;
  const invB=yr.inverted?`<div class="inv-alert">⚠ CURVE INVERTED — 10Y &lt; 5Y</div>`:'';
  const shCls=yr.shape==='normal'?'sh-n':yr.shape==='flat'?'sh-f':'sh-i';

  /* Macro */
  const mc=d.macro;
  const cpiCol=mc.cpiYoy>5?'var(--rd)':mc.cpiYoy>3?'var(--or)':mc.cpiYoy<0?'var(--bl)':'var(--green)';

  const gdpQCol=mc.gdpQoQ<0?'var(--rd)':mc.gdpQoQ<0.5?'var(--or)':'var(--green)';

  /* Budget */
  let budH='';
  d.budget.items.forEach((it,i)=>{
    budH+=`<div class="bud-row"><div class="bud-rk">${i+1}</div><div class="bud-nm">${it.name}</div><div class="bud-amt">${it.amount} ${d.budget.currency.split(' ')[0]}</div><div class="bud-pct">${it.pct}%</div></div>`;

  /* Population */
  const pop=d.population;

  <div class="two-col">
    <!-- POLITICAL -->

      <div class="card">
        <div class="card-hdr"><span class="card-title">Executive Leadership</span></div>
        ${d.pm?`<div class="leader-card"><div class="avatar">${d.leader.initials}</div><div><div class="lname">${d.leader.name}</div><div class="lrole">${d.leader.title}</div><div class="lparty">${d.leader.party} · since ${d.leader.since}</div></div></div>

        <div class="parl-bar">${parlBar}</div>
        <div style="display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mu);margin-bottom:8px"><span>0</span><span>Majority: ${cs.majority}</span><span>${tot}</span></div>

        ${parlLeg}

        <div class="el-grid">${elH}</div>
      </div>
      <div class="card">

        ${topicsBlock(d.topics)}
      </div>
      <div class="card">
        <div class="card-hdr"><span class="card-title">${cid==='france'?'Approval Ratings — President & PM':('Approval — '+(apPerson.title||'')+': '+apPerson.name)}</span></div>

function initPopChart(cid,pyramid){
  const ctx=document.getElementById(`pop-${cid}`);
  if(!ctx)return;
  destroyChart(`pop-${cid}`);
  const maxAbs=Math.max(...pyramid.flatMap(r=>[Math.abs(r.m),r.f]))+1;
  CHARTS[`pop-${cid}`]=new Chart(ctx,{type:'bar',
    data:{labels:pyramid.map(r=>r.a),datasets:[
      {label:'Male',data:pyramid.map(r=>r.m),backgroundColor:'rgba(15,84,153,0.55)',borderWidth:0},
      {label:'Female',data:pyramid.map(r=>r.f),backgroundColor:'rgba(198,66,107,0.55)',borderWidth:0},
    ]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',titleColor:'#1A1614',bodyColor:'#6B5E52',borderColor:'#E2D5C8',borderWidth:1,callbacks:{label:c=>`${Math.abs(c.parsed.x).toFixed(1)}M`}}},

/* ══════════════════════ LIVE DATA — /api/fx serverless ══════════════════════
   FX spot + MA50/MA200:  frankfurter.app  (free, no auth, 210d history)
   US yields:             stooq.com        (free, no auth, CSV)
══════════════════════════════════════════════════════════════════════════════ */

function updateFXDisplay(cid, { current, change, ma50, ma200, decimals }) {
  const pair    = C[cid]?.fx?.pair || CHINA.fx.pair;
  const fmt     = v => (v != null ? v.toFixed(decimals) : '—');
  const valEl   = document.getElementById(`fx-val-${cid}`);
  const chgEl   = document.getElementById(`fx-chg-${cid}`);
  const badgeEl = document.getElementById(`fx-badge-${cid}`);
  const ma50El  = document.getElementById(`ma50-${cid}`);
  const ma200El = document.getElementById(`ma200-${cid}`);
  const mxEl    = document.getElementById(`mx-fx-${cid}`);

  if (valEl && current != null) {
    valEl.textContent = fmt(current);
    if (badgeEl) { badgeEl.className = 'live-badge'; badgeEl.textContent = 'LIVE'; }
  }
  if (chgEl && change != null) {
    const col = change > 0 ? 'var(--or)' : 'var(--green)';
    chgEl.innerHTML = `<span style="color:${col}">${change >= 0 ? '+' : ''}${change.toFixed(decimals)}</span>&nbsp;<span style="color:var(--mu)">1d</span>`;
  }
  if (ma50El)  ma50El.textContent  = fmt(ma50);
  if (ma200El) ma200El.textContent = fmt(ma200);
  if (mxEl && current != null) {
    mxEl.innerHTML = `<strong style="font-family:'IBM Plex Mono',monospace">${fmt(current)}</strong><br>`
      + `<span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--mu)">${pair}</span>`
      + `&nbsp;<span class="live-badge">LIVE</span>`;
  }
}

async function doLiveFetch() {
  const btn    = document.getElementById('refresh-btn');
  const status = document.getElementById('mx-status');
  if (btn)    { btn.disabled = true; btn.textContent = '⟳ Fetching…'; }
  if (status)   status.textContent = 'fetching…';
  let ok = 0;

  // ── FX spot + MA50 + MA200 (one call, all countries) ────────────────────
  // decimals per country
  const dec = { usa:2, france:4, uk:4, germany:4, japan:2, china:4 };
  try {
    const apiBase = window.location.hostname === 'localhost' || window.location.protocol === 'file:' ? 'https://tzofeh.vercel.app' : '';
    const r    = await fetch(apiBase + '/api/fx?mode=fx');
    const data = await r.json();
    if (data.ok && data.fx) {
      Object.entries(data.fx).forEach(([cid, vals]) => {
        if (!vals) return;
        const d = dec[cid] ?? 4;
        updateFXDisplay(cid, {
          current:  vals.current,
          change:   (vals.current != null && vals.prev != null) ? vals.current - vals.prev : null,
          ma50:     vals.ma50,
          ma200:    vals.ma200,
          decimals: d,
        });
      });
      ok++;
    }
  } catch(e) { console.warn('FX fetch failed:', e.message); }

  // ── US Treasury Yields ───────────────────────────────────────────────────
  try {
    const r    = await fetch(apiBase + '/api/fx?mode=yields');
    const data = await r.json();
    if (data.ok && data.yields) {
      ['y5','y10','y30'].forEach(key => {
        const price = data.yields[key];
        if (price == null) return;
        const el = document.getElementById(`${key}-usa`);
        if (el) el.textContent = `${price.toFixed(2)}%`;
      });
      const badge = document.getElementById('yld-badge-usa');
      if (badge) { badge.className = 'live-badge'; badge.textContent = 'LIVE'; }
      const mx = document.getElementById('mx-10y-usa');
      if (mx && data.yields.y10 != null)
        mx.innerHTML = `<span style="font-family:'IBM Plex Mono',monospace;font-weight:600">${data.yields.y10.toFixed(2)}%</span>&nbsp;<span class="live-badge">LIVE</span>`;
      ok++;
    }
  } catch(e) { console.warn('Yields fetch failed:', e.message); }

  const lbl = document.getElementById('fx-live-lbl');
  if (lbl) lbl.innerHTML = '<span class="live-badge">LIVE</span>';
  if (status) status.textContent = ok > 0
    ? `${ok} data feeds live · ${new Date().toLocaleTimeString()}`
    : 'Data unavailable — showing static values';
  if (btn) { btn.disabled = false; btn.textContent = '⟳ Refresh'; }
}

/* ══════════════════════ THEME TOGGLE ══════════════════════ */
const CHART_COLORS = {
  light: {
    grid:'rgba(226,213,200,.5)', tick:'#A8998C',
    tooltipBg:'#fff', tooltipTitle:'#1A1614', tooltipBody:'#6B5E52', tooltipBorder:'#E2D5C8',
    legend:'#6B5E52',
    y5:'#0F5499', y10:'#0D7680', y30:'#EB6400',
    maleBar:'rgba(15,84,153,0.55)', femaleBar:'rgba(198,66,107,0.55)',
  },
  dark: {
    grid:'rgba(28,35,51,0.8)', tick:'#768390',
    tooltipBg:'#0d1117', tooltipTitle:'#cdd9e5', tooltipBody:'#768390', tooltipBorder:'#1c2333',
    legend:'#768390',
    y5:'#4493f8', y10:'#00d98b', y30:'#e3a447',
    maleBar:'rgba(68,147,248,0.7)', femaleBar:'rgba(232,121,160,0.7)',
  }
};

function applyChartTheme(dark){
  const col = dark ? CHART_COLORS.dark : CHART_COLORS.light;
  // Re-render energy donuts with updated theme
  Object.keys(CHARTS).filter(id => id.startsWith('energy-donut-')).forEach(id => {
    const cid = id.replace('energy-donut-','');
    const country = ['usa','france','uk','germany','japan','china'].find(c=>c===cid) || cid;
    const d = C[country] || CHINA;
    if(d?.energy?.mix) renderEnergyDonut(cid, d.energy.mix);
  });
  Object.entries(CHARTS).forEach(([id, chart]) => {
    if(!chart) return;
    const isYield = id.startsWith('yield-');
    const isPop = id.startsWith('pop-');
    // Tooltip
    chart.options.plugins.tooltip.backgroundColor = col.tooltipBg;
    chart.options.plugins.tooltip.titleColor = col.tooltipTitle;
    chart.options.plugins.tooltip.bodyColor = col.tooltipBody;
    chart.options.plugins.tooltip.borderColor = col.tooltipBorder;
    // Scales
    if(chart.options.scales?.x){
      chart.options.scales.x.grid.color = col.grid;
      chart.options.scales.x.ticks.color = col.tick;
    }
    if(chart.options.scales?.y){
      chart.options.scales.y.grid.color = col.grid;
      chart.options.scales.y.ticks.color = col.tick;
    }
    if(isYield){
      if(chart.options.plugins.legend) chart.options.plugins.legend.labels.color = col.legend;
      chart.data.datasets[0].borderColor = col.y5;
      chart.data.datasets[1].borderColor = col.y10;
      chart.data.datasets[2].borderColor = col.y30;
    }
    if(isPop){
      chart.data.datasets[0].backgroundColor = col.maleBar;
      chart.data.datasets[1].backgroundColor = col.femaleBar;
    }
    chart.update('none');
  });
}

function toggleTheme(){
  const body = document.body;
  const btn = document.getElementById('theme-btn');
  const isDark = body.classList.toggle('dark');
  btn.textContent = isDark ? '☀' : '☽';
  btn.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
  localStorage.setItem('tzofeh-theme', isDark ? 'dark' : 'light');
  applyChartTheme(isDark);
}

/* ══════════════════════ TAB SWITCH ══════════════════════ */
function switchTab(id){
  document.querySelectorAll('.tab-panel').forEach(p=>p.style.display='none');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tab-${id}`).style.display='block';
  const ids=['matrix','usa','france','uk','germany','japan','china','eu'];
  const idx=ids.indexOf(id);
  if(idx>=0)document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  window.scrollTo(0,0);
}

/* ══════════════════════ INIT ══════════════════════ */
document.addEventListener('DOMContentLoaded',()=>{
  // Restore saved theme
  if(localStorage.getItem('tzofeh-theme')==='dark'){
    document.body.classList.add('dark');
    const btn=document.getElementById('theme-btn');
    if(btn){btn.textContent='☀';btn.title='Switch to light mode';}
  }

  renderMatrix();
  Object.keys(C).forEach(cid=>renderCountry(cid));
  renderChina();
  renderEU();
  buildTicker();
  injectUSAExtras();

  // Init all charts (render all panels briefly for DOM presence)
  document.querySelectorAll('.tab-panel').forEach(p=>p.style.display='block');
  setTimeout(()=>{
    Object.keys(C).forEach(cid=>{initYieldChart(cid,C[cid].yields);initPopChart(cid,C[cid].population.pyramid);});
    initYieldChart('china',CHINA.yields);
    initPopChart('china',CHINA.population.pyramid);
    // Energy donuts
    Object.keys(C).forEach(cid=>{ if(C[cid].energy?.mix) renderEnergyDonut(cid,C[cid].energy.mix); });
    if(CHINA.energy?.mix) renderEnergyDonut('china',CHINA.energy.mix);

    // Apply dark theme to charts if needed
    if(document.body.classList.contains('dark')) applyChartTheme(true);

    document.querySelectorAll('.tab-panel').forEach(p=>p.style.display='none');
    document.getElementById('tab-matrix').style.display='block';
    doLiveFetch().catch(()=>{});
  },80);
});

document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  const ids=['matrix','usa','france','uk','germany','japan','china','eu'];
  const n=parseInt(e.key);
  if(n>=1&&n<=8)switchTab(ids[n-1]);
});
